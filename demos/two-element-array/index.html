<!DOCTYPE html>
<html>
    <head>
        <title>Two-Element Array Antenna</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body, html {
                width: 100%;
                height: 100%;
            }

            body {
                margin: 0;
                display: flex;
                font-family: sans-serif;
            }
            
            main {
                max-width: 32em;
                margin: auto;
                padding: 1.5em;
            }

            #plot {
                width: 100%;
            }

            input[type="range"] {
                width: 100%;
            }

            datalist {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
            }

            datalist option {
                font-size: 11pt;
            }

            label {
                display: inline-block;
                font-weight: bold;
                margin-top: 1.5em;
            }
        </style>
    </head>
    <body>
        <main>
            
            <canvas id="plot"></canvas>
            
            <label for="distance">distance between sources</label>
            <input type="range" id="distance" max="1" step="any" value="0.125" list="distance-steplist">
            <datalist id="distance-steplist"></datalist>
            
            <label for="phase">phase difference</label>
            <input type="range" id="phase" max="1" step="any" value="0" list="phase-steplist">
            <datalist id="phase-steplist"></datalist>

        </main>
        <script src="two-element-array.js"></script>
    </body>
</html>
