<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta property="og:title" content="fox">
        <meta property="og:description" content="it's fox time">
        <title>fox time</title>
        <style>
            body {
                font-family: monospace;
                background-color: #000000;
                color: #ffffff;
                height: 100vh;
                margin: 0;
                display: flex;
            }

            h1 {
                font-size: 36pt;
            }

            div {
                display: flex;
                margin: auto;
            }

            #fox {
                flex-direction: column;
            }

            #fox p {
                text-align: center;
                font-size: 16pt;
            }

            video {
                aspect-ratio: 1/1;
                max-width: 90%;
                max-height: 90%;
                margin: auto;
            }
        </style>
    </head>
    <body>
        <div id="initial">
            <h1>click anywhere to begin</h1>
        </div>
        <div id="fox" style="display: none">
            <p>you have foxed for: <span id="time">0.0</span> seconds</p>
            <video loop muted playsinline>
                <source src="fox.mp4">
            </video>
        </div>
        <script>

            if("audioSession" in navigator) {
                navigator.audioSession.type = "playback";
            }

            const ctx = new AudioContext();
            const playSound = () => {
                ctx.resume();
                fetch("fox.mp3")
                    .then(resp => resp.arrayBuffer())
                    .then(buffer => ctx.decodeAudioData(buffer))
                    .then(data => {
                        
                        let playTime = ctx.currentTime + 0.2;
                        const queueSound = () => {
                            const source = new AudioBufferSourceNode(ctx);
                            source.buffer = data;
                            source.connect(ctx.destination);
                            source.start(playTime);
                            playTime += data.duration;
                            setTimeout(queueSound, data.duration);
                        };

                        queueSound();

                    });
            };

            const runTimer = () => {
                const start = Date.now();
                const step = () => {
                    document.getElementById("time").textContent = Number((Date.now()-start)/1000).toFixed(2);
                    requestAnimationFrame(step);
                };
                step();
            };

            let running = false;
            const run = () => {
                if(running) {
                    return;
                }
                running = true;
                document.getElementById("initial").style.display = "none";
                document.getElementById("fox").style.display = "";
                document.querySelector("video").play();
                playSound();
                runTimer();
            };

            window.addEventListener("click", run);
            window.addEventListener("touchstart", run);
        </script>
    </body>
</html>
